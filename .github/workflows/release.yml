name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tags must look like v1.2, v1.2.3, or v1.2.3-rc.1; got '$tag'." >&2
            exit 1
          fi

          version="${tag#v}"
          asset="GPU_normalize_audio_tdarr-${version}.zip"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=$version"
            echo "asset=$asset"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Validate source entrypoint
        run: node --check src/gpuNormalizeAudio/index.js

      - name: Validate source runtime scripts
        run: python3 -m py_compile src/gpuNormalizeAudio/runtime/bin/loudnorm-gpu-source-port src/gpuNormalizeAudio/runtime/cuda/compile_cuda_ptx.py

      - name: Validate version folder
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          plugin_dir="FlowPlugins/CommunityFlowPlugins/audio/gpuNormalizeAudio/$version"
          if [ ! -d "$plugin_dir" ]; then
            echo "Missing tracked release folder: $plugin_dir" >&2
            echo "Run ./work/tdarr stage-version $version and commit the result before tagging." >&2
            exit 1
          fi
          if grep -R "__PLUGIN_VERSION__" "$plugin_dir"; then
            echo "Tracked release folder still contains __PLUGIN_VERSION__." >&2
            exit 1
          fi
          node --check "$plugin_dir/index.js"
          python3 -m py_compile \
            "$plugin_dir/runtime/bin/loudnorm-gpu-source-port" \
            "$plugin_dir/runtime/cuda/compile_cuda_ptx.py"

      - name: Build release package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          asset="${{ steps.release.outputs.asset }}"
          package_dir="GPU_normalize_audio_tdarr-${version}"
          staging="$(mktemp -d)"

          plugin_base="FlowPlugins/CommunityFlowPlugins/audio/gpuNormalizeAudio"
          plugin_dir="$plugin_base/$version"

          mkdir -p "$staging/$package_dir"
          git archive --format=tar HEAD README.md "$plugin_dir" | tar -C "$staging/$package_dir" -xf -

          node --check "$staging/$package_dir/$plugin_base/$version/index.js"
          python3 -m py_compile \
            "$staging/$package_dir/$plugin_base/$version/runtime/bin/loudnorm-gpu-source-port" \
            "$staging/$package_dir/$plugin_base/$version/runtime/cuda/compile_cuda_ptx.py"

          (cd "$staging" && python3 -m zipfile --create "$GITHUB_WORKSPACE/$asset" "$package_dir")
          sha256sum "$asset" > "$asset.sha256"
          cat "$asset.sha256"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${{ steps.release.outputs.version }}"
          asset="${{ steps.release.outputs.asset }}"
          release_tldr="$(git log -1 --format='%s%n%n%b' "$tag")"
          if [[ "$(git cat-file -t "$tag")" == "tag" ]]; then
            release_tldr="$(git tag -l --format='%(contents)' "$tag")"
          fi
          if [[ -z "${release_tldr//[[:space:]]/}" ]]; then
            release_tldr="Release package for ${tag}."
          fi
          release_notes="release-notes/${version}.md"

          {
            printf '## TLDR\n\n'
            printf '%s\n\n' "$release_tldr"
            if [ -f "$release_notes" ]; then
              cat "$release_notes"
              printf '\n\n'
            else
              printf '## Performance\n\n'
              printf 'No release-specific performance notes are tracked for `%s`. Do not claim performance acceptance without comparing against Tdarr CPU-only `Normalize Audio`.\n\n' "$tag"
            fi
            printf 'Release for `%s`.\n\n' "$tag"
            printf 'Install path inside Tdarr, intentionally versioned so releases can coexist:\n\n'
            printf '```text\n'
            printf 'FlowPlugins/CommunityFlowPlugins/audio/gpuNormalizeAudio/%s/\n' "$version"
            printf '```\n\n'
            printf 'Keep this version folder. Do not flatten the files into `gpuNormalizeAudio/`.\n\n'
            printf 'Attached package: `%s`\n\n' "$asset"
            printf 'SHA256:\n\n'
            printf '```text\n'
            cat "$asset.sha256"
            printf '```\n'
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          prerelease_arg=()
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            prerelease_arg=(--prerelease)
          fi

          gh release create \
            "${GITHUB_REF_NAME}" \
            "${{ steps.release.outputs.asset }}" \
            "${{ steps.release.outputs.asset }}.sha256" \
            --title "GPU Normalize Audio ${{ steps.release.outputs.version }}" \
            --notes-file RELEASE_NOTES.md \
            "${prerelease_arg[@]}"
